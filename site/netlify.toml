# Netlify configuration for Your Analyst
[build]
  publish = "."
  functions = "netlify/functions"

# Route all /api/yahoo* paths to the single function (it handles chart, /search, /quote internally)
[[redirects]]
  from = "/api/yahoo"
  to   = "/.netlify/functions/yahoo"
  status = 200
  force  = true

[[redirects]]
  from = "/api/yahoo/*"
  to   = "/.netlify/functions/yahoo/:splat"
  status = 200
  force  = true
